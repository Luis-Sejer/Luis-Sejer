# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates for 23:00 Europe/Copenhagen on weekdays (handles DST)
  schedule:
    - cron: "0 21 * * 1-5"
    - cron: "0 22 * * 1-5"
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: { branches: ["master", "main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check local Copenhagen time
        if: github.event_name == 'schedule'
        id: copenhagen-time
        run: |
          if [ "$(TZ=Europe/Copenhagen date +%H)" = "23" ]; then
            echo "run_metrics=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_metrics=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: lowlighter/metrics@latest
        if: github.event_name != 'schedule' || steps.copenhagen-time.outputs.run_metrics == 'true'
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Luis-Sejer
          template: classic
          base: header, activity, metadata
          config_timezone: Europe/Copenhagen
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
